on: [push]

jobs:
  flake-build:
    runs-on: local/${{ matrix.system }}

    strategy:
      matrix:
        system:
          - x86_64-linux
          - aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          export HOME=$PWD
          nix develop .# -c seed-ci --attic-upload=true --attic-use=true --nom=false --system ${{ matrix.system }}
        env:
          ATTIC_KEY: ${{ secrets.ATTIC_KEY }}

