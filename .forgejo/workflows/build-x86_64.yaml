on:
  push:

env:
  ATTIC_URL: ${{ vars.ATTIC_URL }}
  ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
  ATTIC_KEY: ${{ secrets.ATTIC_KEY }}
  SOWER_ENDPOINT: ${{ vars.SOWER_ENDPOINT }}

jobs:
  build-and-seed-x86_64:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD
          nix develop .# --command seed-ci --attic-upload=true --nom=false --sower-seed=true --system x86_64-linux --cache-build-deps=true

  sower:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD

          # Setup attic cache
          attic login main $ATTIC_URL $ATTIC_KEY

          # Build and push to attic
          nix run .#cli -- builder push --workers 4 --system x86_64-linux --target "attic:main:$ATTIC_CACHE" --debug
