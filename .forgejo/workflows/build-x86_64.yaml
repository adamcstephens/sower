on:
  push:

env:
  ATTIC_URL: ${{ vars.ATTIC_URL }}
  ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
  SOWER_ENDPOINT: ${{ vars.SOWER_ENDPOINT }}

jobs:
  sower:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - name: go cli
        run: |
          export HOME=$PWD

          nix develop .#ci --command attic login junco $ATTIC_URL --set-default $ATTIC_KEY
          nix develop .#ci --command sower build --cache attic://junco:$ATTIC_CACHE --eval-jobs 12 .#sowerJobs.x86_64-linux --push
        env:
          ATTIC_KEY: ${{ secrets.ATTIC_KEY }}

  elixir-format:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD
          nix develop .# --command just check-elixir-format

  # elixir-test:
  #   runs-on: local/x86_64-linux
  #
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - run: |
  #         export HOME=$PWD
  #         nix develop .# --command just check-elixir-test

  go:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD
          nix develop .# --command just check-go

  e2e:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD
          nix develop .# --command just check-nix
