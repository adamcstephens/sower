name: checks

on:
  push:

jobs:
  elixir-format:
    runs-on: local/x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - run: |
          export HOME=$PWD
          nix develop .# --command just check-elixir-format

  # elixir-test:
